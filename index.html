<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<meta name="theme-color" content="#0a0a0a">
<title>LIFT</title>

<style>
  :root {
    --bg: #141414;
    --surface: #1e1e1e;
    --surface2: #272727;
    --border: #383838;
    --muted: #666;
    --text: #f2f2f2;
    --dim: #999;
    --accent: #d4ff00;
    --accent-dim: rgba(212,255,0,0.12);
    --radius: 14px;
    --mono: ui-monospace, 'Menlo', 'Courier New', monospace;
    --display: system-ui, -apple-system, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100dvh;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ── SCREENS ── */
  .screen { display:none; min-height:100dvh; flex-direction:column; padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 32px); }
  .screen.active { display:flex; }

  /* ── HOME ── */
  #home { padding-top: max(env(safe-area-inset-top), 52px); gap:0; }

  .home-header { margin-bottom: 36px; }
  .home-header h1 { font-family: var(--display); font-size: 62px; letter-spacing:4px; color: var(--accent); line-height:1; font-weight:900; font-stretch:condensed; }
  .home-header p { font-size: 11px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-top:6px; }

  .last-session {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .last-session-label { font-size: 10px; letter-spacing:3px; color: var(--dim); text-transform:uppercase; margin-bottom:6px; }
  .last-session-info { font-size:15px; color: var(--text); }
  .last-session-date { font-size:12px; color: var(--dim); margin-top:4px; }

  .workout-cards { display:flex; flex-direction:column; gap:14px; margin-bottom:16px; }

  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    position: relative;
    overflow: hidden;
  }
  .workout-card:active { background: var(--surface2); }
  .workout-card.recommended { border-color: var(--accent); }
  .workout-card.recommended::before {
    content:'NEXT UP';
    position:absolute; top:14px; right:14px;
    font-size:9px; letter-spacing:2px;
    color: var(--accent); opacity:.9;
  }

  .card-label { font-size:11px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:6px; }
  .card-name { font-family: var(--display); font-size:34px; letter-spacing:2px; color:var(--text); line-height:1; font-weight:900; font-stretch:condensed; }
  .card-desc { font-size:12px; color:var(--dim); margin-top:10px; line-height:1.7; }
  .card-last { font-size:11px; color:var(--dim); margin-top:10px; }
  .card-last span { color:var(--text); }

  .history-btn {
    width:100%; margin-top:8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .history-btn:active { border-color: var(--muted); color: var(--text); }

  /* ── WORKOUT SCREEN ── */
  #workout { padding-top: max(env(safe-area-inset-top), 20px); }

  .workout-header {
    display:flex; align-items:center; gap:14px;
    margin-bottom:4px;
  }
  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width:42px; height:42px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text); font-size:22px;
    flex-shrink:0;
  }
  .back-btn:active { background: var(--surface2); }

  .workout-title { font-family:var(--display); font-size:38px; letter-spacing:2px; color:var(--accent); line-height:1; font-weight:900; font-stretch:condensed; }
  .workout-date { font-size:11px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-top:3px; }

  .superset-list { flex:1; overflow-y:auto; padding-bottom:16px; display:flex; flex-direction:column; gap:14px; margin-top:18px; }

  .superset-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .superset-header {
    padding: 11px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display:flex; align-items:center; gap:8px; flex-wrap:nowrap;
  }
  .superset-tag {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color: var(--accent); background: var(--accent-dim);
    padding:3px 8px; border-radius:4px; flex-shrink:0;
  }
  .superset-muscles { font-size:11px; letter-spacing:1px; color:var(--dim); }
  .superset-note { font-size:10px; color:var(--dim); opacity:.7; margin-left:auto; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px; }

  .exercise-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .exercise-row:last-child { border-bottom:none; }

  .ex-name { font-size:15px; color:var(--text); margin-bottom:10px; font-weight:600; letter-spacing:0.2px; }
  .ex-prev { font-size:11px; color:var(--dim); margin-bottom:10px; }
  .ex-prev strong { color:var(--muted); }

  .sets-row { display:flex; flex-direction:column; gap:8px; }

  .set-input-row {
    display:grid; grid-template-columns: 26px 1fr 1fr 40px; gap:8px; align-items:center;
  }
  .set-num { font-size:11px; color:var(--dim); text-align:center; }

  .set-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    text-align: center;
    width: 100%;
    -webkit-appearance: none;
    transition: border-color .15s, background .15s;
  }
  .set-field::placeholder { color: var(--muted); font-size:13px; }
  .set-field:focus { outline:none; border-color: var(--accent); background: var(--bg); }
  .set-field.pr { border-color: var(--accent) !important; color: var(--accent) !important; }

  .set-check {
    width:40px; height:40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px;
    transition: background .1s, border-color .1s;
  }
  .set-check.done { background: var(--accent); border-color: var(--accent); }

  .add-set-btn {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 10px;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing:2px;
    cursor:pointer;
    width:100%; margin-top:6px;
    text-transform:uppercase;
  }
  .add-set-btn:active { border-color:var(--muted); color:var(--text); }

  .field-label { font-size:9px; letter-spacing:1px; color:var(--dim); text-align:center; margin-bottom:2px; text-transform:uppercase; }

  .finish-btn {
    width:100%; margin-top:18px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 20px;
    color: #111;
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 3px;
    font-weight: 900;
    font-stretch: condensed;
    cursor:pointer;
    transition: opacity .15s;
  }
  .finish-btn:active { opacity:.85; }

  /* ── HISTORY SCREEN ── */
  #history { padding-top: max(env(safe-area-inset-top), 20px); }

  .history-header { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
  .history-title { font-family:var(--display); font-size:38px; letter-spacing:2px; color:var(--text); font-weight:900; font-stretch:condensed; }

  .history-list { display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1; padding-bottom:16px; }

  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor:pointer;
    transition: border-color .15s;
  }
  .history-entry:active { border-color: var(--muted); }

  .he-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .he-workout { font-family:var(--display); font-size:24px; letter-spacing:2px; font-weight:900; font-stretch:condensed; }
  .he-date { font-size:11px; color:var(--dim); letter-spacing:1px; }
  .he-exercises { font-size:12px; color:var(--dim); line-height:1.9; }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  .empty-state p { font-size:12px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; }

  /* ── FINISH MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background: rgba(0,0,0,0.88);
    z-index:100; align-items:center; justify-content:center;
    padding:24px;
  }
  .modal-overlay.active { display:flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding:30px 24px;
    width:100%; max-width:360px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal h2 { font-family:var(--display); font-size:36px; letter-spacing:2px; color:var(--accent); margin-bottom:8px; font-weight:900; font-stretch:condensed; }
  .modal p { font-size:13px; color:var(--dim); margin-bottom:22px; line-height:1.6; }
  .modal-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
  .stat-box { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:center; }
  .stat-val { font-family:var(--display); font-size:30px; color:var(--text); font-weight:900; font-stretch:condensed; }
  .stat-label { font-size:10px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-top:3px; }
  .modal-btn {
    width:100%; background:var(--accent); border:none; border-radius:12px;
    padding:18px; color:#111; font-family:var(--display); font-size:20px;
    letter-spacing:2px; cursor:pointer; font-weight:900; font-stretch:condensed;
  }

  /* number input tweaks */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-header">
    <h1>LIFT</h1>
    <p>Progressive overload tracker</p>
  </div>

  <div id="last-session-box" class="last-session" style="display:none">
    <div class="last-session-label">Last session</div>
    <div class="last-session-info" id="last-session-info"></div>
    <div class="last-session-date" id="last-session-date"></div>
  </div>

  <div class="workout-cards">
    <div class="workout-card" id="card-a" onclick="startWorkout('A')">
      <div class="card-label">Workout A</div>
      <div class="card-name">VERTICAL</div>
      <div class="card-desc">OHP + Pull-up · Incline DB + Row<br>Squat + Rear Fly · DB RDL + Ab Wheel</div>
      <div class="card-last" id="card-a-last"></div>
    </div>
    <div class="workout-card" id="card-b" onclick="startWorkout('B')">
      <div class="card-label">Workout B</div>
      <div class="card-name">HINGE</div>
      <div class="card-desc">Deadlift · Dip + Pull-up<br>Split Squat + DB Row · Lateral Raise + Curl</div>
      <div class="card-last" id="card-b-last"></div>
    </div>
  </div>

  <button class="history-btn" onclick="showHistory()">View history</button>
</div>

<!-- WORKOUT -->
<div id="workout" class="screen">
  <div class="workout-header">
    <div class="back-btn" onclick="showHome()">‹</div>
    <div>
      <div class="workout-title" id="workout-title"></div>
      <div class="workout-date" id="workout-date"></div>
    </div>
  </div>

  <div class="superset-list" id="superset-list"></div>
  <button class="finish-btn" onclick="finishWorkout()">FINISH WORKOUT</button>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="history-header">
    <div class="back-btn" onclick="showHome()">‹</div>
    <div class="history-title">HISTORY</div>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- FINISH MODAL -->
<div class="modal-overlay" id="finish-modal">
  <div class="modal">
    <h2>DONE</h2>
    <p id="modal-msg">Session saved.</p>
    <div class="modal-stats" id="modal-stats"></div>
    <button class="modal-btn" onclick="closeModal()">BACK TO HOME</button>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────

const WORKOUTS = {
  A: {
    name: "VERTICAL + HORIZONTAL",
    supersets: [
      {
        tag: "Superset 1", muscles: "SHOULDERS · LATS",
        note: "BB in rack · step to pull-up bar",
        exercises: [
          { id:"a-ohp",    name:"Barbell Overhead Press", sets:3 },
          { id:"a-pullup", name:"Weighted Pull-up",       sets:3 }
        ]
      },
      {
        tag: "Superset 2", muscles: "UPPER CHEST · MID BACK",
        note: "Same DBs for both — incline then row",
        exercises: [
          { id:"a-incline", name:"Incline DB Press",   sets:3 },
          { id:"a-dbrow",   name:"DB Row (each side)", sets:3 }
        ]
      },
      {
        tag: "Superset 3", muscles: "QUADS · REAR DELTS",
        note: "Squat rack · light DBs for fly",
        exercises: [
          { id:"a-squat",   name:"Barbell Back Squat",  sets:3 },
          { id:"a-rearfly", name:"Rear Delt DB Fly",    sets:3 }
        ]
      },
      {
        tag: "Superset 4", muscles: "HAMSTRINGS · CORE",
        note: "DBs for RDL · bodyweight for core",
        exercises: [
          { id:"a-rdl",  name:"DB Romanian Deadlift", sets:3 },
          { id:"a-core", name:"Ab Wheel",             sets:3 }
        ]
      }
    ]
  },
  B: {
    name: "HINGE + UNILATERAL",
    supersets: [
      {
        tag: "Straight Sets", muscles: "POSTERIOR CHAIN",
        note: "Deadlifts done solo — too taxing to rush",
        exercises: [
          { id:"b-dead", name:"Conventional Deadlift", sets:3 }
        ]
      },
      {
        tag: "Superset 1", muscles: "LOWER CHEST · LATS",
        note: "Same dip station — dip then pull-up",
        exercises: [
          { id:"b-dip",    name:"Weighted Dip",      sets:3 },
          { id:"b-pullup", name:"Weighted Pull-up",  sets:3 }
        ]
      },
      {
        tag: "Superset 2", muscles: "GLUTES · UPPER BACK",
        note: "Same DBs for both — no equipment swap",
        exercises: [
          { id:"b-split", name:"DB Bulgarian Split Squat", sets:3 },
          { id:"b-dbrow", name:"Single-arm DB Row",        sets:3 }
        ]
      },
      {
        tag: "Superset 3", muscles: "MEDIAL DELTS · BICEPS",
        note: "Light DBs for raises · same DBs for curl",
        exercises: [
          { id:"b-lateral", name:"DB Lateral Raise", sets:3 },
          { id:"b-curl",    name:"DB Curl",           sets:3 }
        ]
      }
    ]
  }
};

// ─── STORAGE ────────────────────────────────────────────

function getData() {
  try { return JSON.parse(localStorage.getItem('lift_data') || '{"sessions":[]}'); }
  catch(e) { return {sessions:[]}; }
}
function saveData(d) { localStorage.setItem('lift_data', JSON.stringify(d)); }

function getLastSession(type) {
  const d = getData();
  return d.sessions.filter(s=>s.type===type).sort((a,b)=>b.ts-a.ts)[0] || null;
}

function getPrevExercise(exId) {
  const d = getData();
  for (let i=d.sessions.length-1;i>=0;i--) {
    const ex = d.sessions[i].exercises?.find(e=>e.id===exId);
    if (ex) return ex;
  }
  return null;
}

// ─── STATE ──────────────────────────────────────────────

let currentWorkoutType = null;
let sessionStart = null;

// ─── NAVIGATION ─────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showHome() { refreshHome(); showScreen('home'); }
function showHistory() { renderHistory(); showScreen('history'); }

// ─── HOME ────────────────────────────────────────────────

function refreshHome() {
  const d = getData();
  const sessions = d.sessions;

  // recommend next workout
  if (sessions.length > 0) {
    const last = sessions[sessions.length-1];
    const next = last.type === 'A' ? 'B' : 'A';
    document.getElementById('card-'+next.toLowerCase()).classList.add('recommended');
    document.getElementById('card-'+(next==='A'?'b':'a')).classList.remove('recommended');

    // last session box
    const box = document.getElementById('last-session-box');
    box.style.display = 'block';
    document.getElementById('last-session-info').textContent = `Workout ${last.type} — ${last.exercises?.length || 0} exercises`;
    document.getElementById('last-session-date').textContent = formatDate(last.ts);
  }

  // cards last date
  ['A','B'].forEach(t => {
    const s = getLastSession(t);
    const el = document.getElementById('card-'+t.toLowerCase()+'-last');
    el.innerHTML = s ? `Last: <span>${formatDate(s.ts)}</span>` : '';
  });
}

// ─── WORKOUT ─────────────────────────────────────────────

function startWorkout(type) {
  currentWorkoutType = type;
  sessionStart = Date.now();
  userEditedWeights.clear();
  const w = WORKOUTS[type];

  document.getElementById('workout-title').textContent = 'WORKOUT ' + type;
  document.getElementById('workout-date').textContent = new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'short'}).toUpperCase();

  const list = document.getElementById('superset-list');
  list.innerHTML = '';

  w.supersets.forEach((ss, si) => {
    const block = document.createElement('div');
    block.className = 'superset-block';

    const hdr = document.createElement('div');
    hdr.className = 'superset-header';
    hdr.innerHTML = `<span class="superset-tag">${ss.tag}</span><span class="superset-muscles">${ss.muscles}</span>${ss.note ? `<span class="superset-note">${ss.note}</span>` : ''}`;
    block.appendChild(hdr);

    ss.exercises.forEach((ex, ei) => {
      const prev = getPrevExercise(ex.id);
      const row = document.createElement('div');
      row.className = 'exercise-row';
      row.id = 'exrow-'+ex.id;

      let prevHTML = '';
      if (prev && prev.sets?.length) {
        const s = prev.sets[0];
        const display = s.reps && s.weight ? `${s.weight}kg × ${s.reps}` : (s.reps ? `BW × ${s.reps}` : '—');
        prevHTML = `<div class="ex-prev">Prev: <strong>${display}</strong>${prev.sets.length > 1 ? ` (+${prev.sets.length-1} sets)` : ''}</div>`;
      }

      row.innerHTML = `
        <div class="ex-name">${ex.name}</div>
        ${prevHTML}
        <div class="sets-row" id="sets-${ex.id}">
          ${buildSetInputs(ex.id, ex.sets, prev)}
        </div>
        <button class="add-set-btn" onclick="addSet('${ex.id}','${ex.name}')">+ add set</button>
      `;
      block.appendChild(row);
    });

    list.appendChild(block);
  });

  showScreen('workout');
}

function buildSetInputs(exId, numSets, prev) {
  let html = '';
  for (let i=0;i<numSets;i++) {
    const ps = prev?.sets?.[i];
    const pw = ps?.weight || '';
    const pr = ps?.reps || '';
    html += buildSetRow(exId, i, pw, pr);
  }
  return html;
}

function buildSetRow(exId, i, prevWeight='', prevReps='') {
  const propagate = i === 0 ? `oninput="propagateWeight('${exId}',this.value)"` : `oninput="markUserEdited('${exId}',${i})"`;
  return `
    <div class="set-input-row" id="setrow-${exId}-${i}">
      <div class="set-num">${i+1}</div>
      <input type="number" inputmode="decimal" class="set-field" id="w-${exId}-${i}" placeholder="${prevWeight||'kg'}" aria-label="weight" ${propagate}>
      <input type="number" inputmode="numeric" class="set-field" id="r-${exId}-${i}" placeholder="${prevReps||'reps'}" aria-label="reps" onchange="checkPR('${exId}',${i})">
      <div class="set-check" id="chk-${exId}-${i}" onclick="toggleCheck('${exId}',${i})"></div>
    </div>
  `;
}

// Tracks which weight fields the user has manually edited
const userEditedWeights = new Set();

function markUserEdited(exId, i) {
  userEditedWeights.add(`${exId}-${i}`);
}

function propagateWeight(exId, value) {
  const container = document.getElementById('sets-'+exId);
  const rows = container.querySelectorAll('.set-input-row');
  rows.forEach((row, i) => {
    if (i === 0) return;
    if (userEditedWeights.has(`${exId}-${i}`)) return; // user set their own value
    const wEl = document.getElementById(`w-${exId}-${i}`);
    if (wEl) wEl.value = value || '';
  });
}

function addSet(exId) {
  const container = document.getElementById('sets-'+exId);
  const existing = container.querySelectorAll('.set-input-row').length;
  const prev = getPrevExercise(exId);
  const ps = prev?.sets?.[existing];
  const div = document.createElement('div');
  div.innerHTML = buildSetRow(exId, existing, ps?.weight||'', ps?.reps||'');
  container.appendChild(div.firstElementChild);
  const set1Weight = document.getElementById('w-'+exId+'-0')?.value;
  if (set1Weight) {
    const newWeightEl = document.getElementById('w-'+exId+'-'+existing);
    if (newWeightEl && !newWeightEl.value) newWeightEl.value = set1Weight;
  }
}


function toggleCheck(exId, i) {
  const chk = document.getElementById(`chk-${exId}-${i}`);
  chk.classList.toggle('done');
  chk.textContent = chk.classList.contains('done') ? '✓' : '';
}

function checkPR(exId, i) {
  const wEl = document.getElementById(`w-${exId}-${i}`);
  const rEl = document.getElementById(`r-${exId}-${i}`);
  const prev = getPrevExercise(exId);
  if (!prev || !wEl.value || !rEl.value) return;
  const ps = prev.sets?.[0];
  if (!ps) return;
  const newVol = parseFloat(wEl.value||0) * parseInt(rEl.value||0);
  const prevVol = parseFloat(ps.weight||0) * parseInt(ps.reps||0);
  if (newVol > prevVol) {
    wEl.classList.add('pr');
    rEl.classList.add('pr');
  } else {
    wEl.classList.remove('pr');
    rEl.classList.remove('pr');
  }
}

// ─── FINISH ──────────────────────────────────────────────

function finishWorkout() {
  const w = WORKOUTS[currentWorkoutType];
  const exercises = [];
  let totalSets = 0, prs = 0;

  w.supersets.forEach(ss => {
    ss.exercises.forEach(ex => {
      const container = document.getElementById('sets-'+ex.id);
      if (!container) return;
      const rows = container.querySelectorAll('.set-input-row');
      const sets = [];
      rows.forEach((row, i) => {
        const wEl = document.getElementById(`w-${ex.id}-${i}`);
        const rEl = document.getElementById(`r-${ex.id}-${i}`);
        const w = wEl?.value?.trim();
        const r = rEl?.value?.trim();
        if (r) {
          sets.push({ weight: w || null, reps: parseInt(r) });
          totalSets++;
          if (wEl?.classList.contains('pr')) prs++;
        }
      });
      if (sets.length) exercises.push({ id:ex.id, name:ex.name, sets });
    });
  });

  const duration = Math.round((Date.now()-sessionStart)/60000);
  const session = {
    type: currentWorkoutType,
    ts: Date.now(),
    duration,
    exercises
  };

  const d = getData();
  d.sessions.push(session);
  saveData(d);

  // Modal
  const stats = document.getElementById('modal-stats');
  stats.innerHTML = `
    <div class="stat-box"><div class="stat-val">${totalSets}</div><div class="stat-label">Sets done</div></div>
    <div class="stat-box"><div class="stat-val">${duration}m</div><div class="stat-label">Duration</div></div>
    ${prs>0?`<div class="stat-box"><div class="stat-val" style="color:var(--accent)">${prs}</div><div class="stat-label">PRs 🔥</div></div>`:''}
    <div class="stat-box"><div class="stat-val">${exercises.length}</div><div class="stat-label">Exercises</div></div>
  `;
  document.getElementById('modal-msg').textContent = `Workout ${currentWorkoutType} saved. Come back stronger.`;
  document.getElementById('finish-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('finish-modal').classList.remove('active');
  showHome();
}

// ─── HISTORY ─────────────────────────────────────────────

function renderHistory() {
  const d = getData();
  const list = document.getElementById('history-list');
  list.innerHTML = '';

  if (!d.sessions.length) {
    list.innerHTML = '<div class="empty-state"><p>No sessions yet</p><p>Complete a workout to see history</p></div>';
    return;
  }

  [...d.sessions].reverse().forEach(s => {
    const entry = document.createElement('div');
    entry.className = 'history-entry';
    const exLines = s.exercises?.slice(0,4).map(e => {
      const st = e.sets?.[0];
      const val = st ? (st.weight ? `${st.weight}kg×${st.reps}` : `BW×${st.reps}`) : '';
      return `${e.name}${val?' — '+val:''}`;
    }).join('\n') || '';
    entry.innerHTML = `
      <div class="he-top">
        <div class="he-workout">WORKOUT ${s.type}</div>
        <div class="he-date">${formatDate(s.ts)}</div>
      </div>
      <div class="he-exercises" style="white-space:pre-line">${exLines}${s.exercises?.length>4?`\n+${s.exercises.length-4} more`:''}</div>
    `;
    list.appendChild(entry);
  });
}

// ─── UTILS ───────────────────────────────────────────────

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = Math.floor((now-d)/86400000);
  if (diff===0) return 'Today';
  if (diff===1) return 'Yesterday';
  if (diff<7) return d.toLocaleDateString('en-ZA',{weekday:'short'});
  return d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
}

// ─── INIT ────────────────────────────────────────────────

refreshHome();
</script>
